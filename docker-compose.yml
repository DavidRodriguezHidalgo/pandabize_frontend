version: '3.7'

services:
  pandabize_front:
    container_name: padabize_front
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - '.:/app'
      - '/app/node_modules'
    ports:
      - 3000:3000
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      REACT_APP_BACKEND_API: 'http://localhost:3001'